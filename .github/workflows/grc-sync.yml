name: GRC Command Center Sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grc-sync:
    name: GRC Sync and Compliance Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Validate GRC data files
        run: python3 grc/scripts/validate.py

      - name: Compute compliance scores
        id: scores
        run: python3 grc/scripts/score.py

      - name: Generate compliance report
        run: python3 grc/scripts/report.py

      - name: Write job summary
        run: |
          echo "## GRC Sync Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Score |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| NIST 800-53 | ${{ steps.scores.outputs.nist }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| ISO 27001   | ${{ steps.scores.outputs.iso }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| SOC 2       | ${{ steps.scores.outputs.soc2 }}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Open risks: **${{ steps.scores.outputs.risks }}** | Open remediations: **${{ steps.scores.outputs.rem }}** | Open incidents: **${{ steps.scores.outputs.inc }}**" >> $GITHUB_STEP_SUMMARY

      - name: Commit updated report
        run: |
          git config user.name "GRC Bot"
          git config user.email "grc-bot@github.com"
          git add grc/reports/compliance-report-latest.md
          git diff --staged --quiet || git commit -m "bot: update compliance report [skip ci]"
          git push
